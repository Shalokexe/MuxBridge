version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: muxbridge-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: muxbridge
    ports:
      - "5432:5432"
    volumes:
      - muxbridge_pgdata:/var/lib/postgresql/data

volumes:
  muxbridge_pgdata:
